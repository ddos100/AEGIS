slug: nist_ai_rmf
name: NIST AI Risk Management Framework 1.0
version: "1.0"
authority: NIST (U.S. Department of Commerce)
jurisdiction: US
description: |
  NIST AI 100-1, AI Risk Management Framework 1.0. This catalogue retains
  ONLY the sub-categories whose application can be tested by AEGIS against
  the AI System Registry, AISIA records, integration metadata, and usage
  telemetry. Categories that prescribe paper artefacts (policies, training,
  consultation logs, etc.) are intentionally omitted.

  Every `requirement_text` quotes the AI RMF Core verbatim. Every control
  has a non-empty `auto_check`, so auto-assessment always produces a
  definitive status (never `not_assessed`).
is_active: true
controls:

  - control_id: NIST-GOVERN-2.1
    title: GOVERN 2.1 — Roles and responsibilities
    source_ref: NIST AI RMF 1.0 Govern 2.1
    requirement_text: |
      Roles and responsibilities and lines of communication related to
      mapping, measuring, and managing AI risks are documented and are
      clear to individuals and teams throughout the organization.
    description: Every AI system has a documented owner in the Registry.
    category: governance
    applies_to: [ai_user, ai_provider]
    evidence_hints:
      - owner_user_id in registry
    auto_check:
      owner_assigned: true

  - control_id: NIST-GOVERN-6.1
    title: GOVERN 6.1 — Third-party policies
    source_ref: NIST AI RMF 1.0 Govern 6.1
    requirement_text: |
      Policies and procedures are in place that address AI risks
      associated with third-party entities, including risks of
      infringement of a third party's intellectual property or other
      rights.
    description: AI provider is assessed (catalogue-matched OR free-text provider documented).
    category: supply_chain
    applies_to: [ai_user]
    evidence_hints:
      - Catalogue match OR provider_name_freetext populated
    auto_check:
      provider_assessed: true

  - control_id: NIST-MAP-1.1
    title: MAP 1.1 — Context and intended purposes
    source_ref: NIST AI RMF 1.0 Map 1.1
    requirement_text: |
      Intended purposes, potentially beneficial uses, context-specific
      laws, norms and expectations, and prospective settings in which
      the AI system will be deployed are understood and documented.
    description: intended_purpose is documented per system.
    category: governance
    applies_to: [ai_user, ai_provider]
    evidence_hints:
      - intended_purpose in registry
    auto_check:
      intended_purpose_documented: true

  - control_id: NIST-MAP-5.1
    title: MAP 5.1 — Impact likelihood and magnitude
    source_ref: NIST AI RMF 1.0 Map 5.1
    requirement_text: |
      Likelihood and magnitude of each identified impact (both
      potentially beneficial and harmful) based on expected use, past
      uses of AI systems in similar contexts, public incident reports,
      feedback from those external to the team that developed or
      deployed the AI system, or other data are identified and
      documented.
    description: AISIA is completed or approved per system.
    category: risk
    applies_to: [ai_user, ai_provider]
    evidence_hints:
      - AISIA completed / approved
    auto_check:
      aisia_status_in: [completed, approved]

  - control_id: NIST-MEASURE-3.1
    title: MEASURE 3.1 — Risk scoring established
    source_ref: NIST AI RMF 1.0 Measure 3.1
    requirement_text: |
      Approaches, personnel, and documentation are in place to
      regularly identify and track existing, unanticipated, and
      emergent AI risks based on factors such as intended and actual
      performance in deployed contexts.
    description: AEGIS risk score has been computed for each system.
    category: monitoring
    applies_to: [ai_provider]
    evidence_hints:
      - current_risk_score populated
    auto_check:
      risk_assessed: true

  - control_id: NIST-MANAGE-4.1
    title: MANAGE 4.1 — Post-deployment monitoring
    source_ref: NIST AI RMF 1.0 Manage 4.1
    requirement_text: |
      Post-deployment AI system monitoring plans are implemented,
      including mechanisms for capturing and evaluating input from
      users and other relevant AI actors, appeal and override,
      decommissioning, incident response, recovery, and change
      management.
    description: AEGIS has observed at least one usage event for the system in operation.
    category: monitoring
    applies_to: [ai_user, ai_provider]
    evidence_hints:
      - ai_usage_events present
    auto_check:
      usage_monitored: true
