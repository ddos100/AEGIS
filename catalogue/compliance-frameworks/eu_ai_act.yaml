slug: eu_ai_act
name: EU AI Act (Regulation (EU) 2024/1689)
version: "2024/1689"
authority: European Union
jurisdiction: EU
description: |
  Regulation (EU) 2024/1689. This catalogue retains ONLY the AI Act
  articles whose application can be tested by AEGIS against the AI System
  Registry, AISIA records, integration metadata, and usage telemetry.
  Articles addressing paper artefacts (QMS docs, CE marking, EU database
  registration, post-market monitoring plans, etc.) are intentionally
  omitted.

  Every `requirement_text` below is a verbatim citation from the OJ
  text. Every control has a non-empty `auto_check`, so auto-assessment
  always produces a definitive status (never `not_assessed`).
is_active: true
controls:

  - control_id: EUAI-ART-6
    title: Classification rules for high-risk AI systems
    source_ref: Regulation (EU) 2024/1689 Article 6
    requirement_text: |
      An AI system shall be considered high-risk where it is intended
      to be used as a safety component of a product, or is itself a
      product, covered by the Union harmonisation legislation listed in
      Annex I; or it is referred to in Annex III, unless it does not
      pose a significant risk of harm to the health, safety or
      fundamental rights of natural persons.
    description: EU AI Act category is documented per system (high_risk, limited_risk, minimal_risk, general_purpose_ai, or not_applicable).
    category: risk
    is_mandatory: true
    applies_to: [ai_provider, ai_user]
    evidence_hints:
      - eu_ai_act_category in registry
    auto_check:
      eu_ai_act_category_documented: true

  - control_id: EUAI-ART-9
    title: Risk management system
    source_ref: Regulation (EU) 2024/1689 Article 9
    requirement_text: |
      A risk management system shall be established, implemented,
      documented and maintained in relation to high-risk AI systems.
      The risk management system shall be understood as a continuous
      iterative process planned and run throughout the entire lifecycle
      of a high-risk AI system, requiring regular systematic review and
      updating.
    description: AISIA exists and is at least in-progress per system.
    category: risk
    is_mandatory: true
    applies_to: [ai_provider]
    evidence_hints:
      - AISIA in_progress / completed / approved
    auto_check:
      aisia_status_in: [in_progress, completed, approved]

  - control_id: EUAI-ART-10
    title: Data and data governance
    source_ref: Regulation (EU) 2024/1689 Article 10
    requirement_text: |
      High-risk AI systems which make use of techniques involving the
      training of AI models with data shall be developed on the basis
      of training, validation and testing data sets that meet the
      quality criteria referred to in paragraphs 2 to 5. Training,
      validation and testing data sets shall be subject to data
      governance and management practices appropriate for the intended
      purpose of the high-risk AI system.
    description: data_types_processed is populated per system.
    category: data
    is_mandatory: true
    applies_to: [ai_provider]
    evidence_hints:
      - Per-system data_types_processed
    auto_check:
      data_types_documented: true

  - control_id: EUAI-ART-11
    title: Technical documentation
    source_ref: Regulation (EU) 2024/1689 Article 11
    requirement_text: |
      The technical documentation of a high-risk AI system shall be
      drawn up before that system is placed on the market or put into
      service and shall be kept up-to-date.
    description: Registry completeness ≥ 80% per system (proxy for technical documentation).
    category: transparency
    is_mandatory: true
    applies_to: [ai_provider]
    evidence_hints:
      - Registry completeness ≥ 80%
    auto_check:
      registry_completeness_min: 80

  - control_id: EUAI-ART-12
    title: Record-keeping (logging)
    source_ref: Regulation (EU) 2024/1689 Article 12
    requirement_text: |
      High-risk AI systems shall technically allow for the automatic
      recording of events ('logs') over the duration of the lifetime of
      the system.
    description: AEGIS has observed at least one usage event per system (proxy for logging implementation).
    category: monitoring
    is_mandatory: true
    applies_to: [ai_provider]
    evidence_hints:
      - ai_usage_events present
    auto_check:
      usage_monitored: true

  - control_id: EUAI-ART-14
    title: Human oversight
    source_ref: Regulation (EU) 2024/1689 Article 14
    requirement_text: |
      High-risk AI systems shall be designed and developed in such a
      way, including with appropriate human-machine interface tools,
      that they can be effectively overseen by natural persons during
      the period in which they are in use.
    description: human_oversight_desc is documented per system.
    category: human_oversight
    is_mandatory: true
    applies_to: [ai_provider, ai_user]
    evidence_hints:
      - human_oversight_desc in registry
    auto_check:
      human_oversight_documented: true

  - control_id: EUAI-ART-27
    title: Fundamental rights impact assessment
    source_ref: Regulation (EU) 2024/1689 Article 27
    requirement_text: |
      Prior to deploying a high-risk AI system referred to in Article
      6(2), deployers that are bodies governed by public law or are
      private entities providing public services shall perform an
      assessment of the impact on fundamental rights that the use of
      such system may produce.
    description: AISIA is completed or approved per system (FRIA equivalent).
    category: risk
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - AISIA completed / approved
    auto_check:
      aisia_status_in: [completed, approved]
