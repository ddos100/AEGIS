slug: dpdpa
name: Digital Personal Data Protection Act, 2023 (India)
version: "2023"
authority: Ministry of Electronics & Information Technology, Government of India
jurisdiction: IN
description: |
  Digital Personal Data Protection Act, 2023 (Act No. 22 of 2023). This
  catalogue retains ONLY the DPDPA obligations whose application to an AI
  system can be tested by AEGIS against the Registry, AISIA, integration
  metadata, and provider catalogue. Procedural / notice obligations
  (notice, consent UX, DSAR workflows, grievance officer, etc.) are
  intentionally omitted — they cannot be machine-verified.

  Every `requirement_text` is a verbatim citation. Every control has a
  non-empty `auto_check`; auto-assessment never produces `not_assessed`.
is_active: true
controls:

  - control_id: DPDPA-S-8(3)
    title: Accuracy and completeness of personal data
    source_ref: DPDP Act 2023 Section 8(3)
    requirement_text: |
      A Data Fiduciary shall ensure the completeness, accuracy and
      consistency of the personal data, if such personal data is likely
      to be used by the Data Fiduciary to make a decision that affects
      the Data Principal, or is likely to be disclosed to another Data
      Fiduciary.
    description: data_types_processed is documented per system so accuracy controls can be applied.
    category: data
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - Per-system data_types_processed
    auto_check:
      data_types_documented: true

  - control_id: DPDPA-S-8(7)
    title: Processor contract
    source_ref: DPDP Act 2023 Section 8(7)
    requirement_text: |
      A Data Fiduciary shall engage, appoint, use or otherwise involve
      a Data Processor only under a valid contract.
    description: AI provider is assessed (catalogue-matched OR free-text provider documented) as a prerequisite for DPA.
    category: supply_chain
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - Catalogue match OR provider_name_freetext populated
      - DPA on file with the AI provider
    auto_check:
      provider_assessed: true

  - control_id: DPDPA-S-16
    title: Cross-border transfer of personal data
    source_ref: DPDP Act 2023 Section 16
    requirement_text: |
      The Central Government may, by notification, restrict the transfer
      of personal data by a Data Fiduciary for processing to such
      country or territory outside India as may be so notified.
    description: AI provider HQ country is in the permitted-jurisdiction allow-list.
    category: data
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - Provider hq_country matches permitted list
    auto_check:
      provider_jurisdiction_permitted: true
