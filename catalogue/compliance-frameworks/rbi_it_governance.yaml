slug: rbi_it_governance
name: RBI Master Direction on IT Governance, Risk, Controls and Assurance Practices, 2023
version: "2023 (07-Nov-2023)"
authority: Reserve Bank of India
jurisdiction: IN
description: |
  RBI Master Direction (DOR.MRG.REC.94/00-00-018/2023-24, 07-Nov-2023).
  This catalogue retains ONLY the paragraphs whose application to an AI
  system can be tested by AEGIS against Registry, AISIA, integration
  metadata, and provider catalogue. Paper-only paragraphs (ITSC charter,
  policies, IS Audit programme, RBI incident-report channel, BCMS docs,
  RBAC documents, crypto policy, etc.) are intentionally omitted.

  Every `requirement_text` is a verbatim citation. Every control has a
  non-empty `auto_check`; auto-assessment never produces `not_assessed`.
is_active: true
controls:

  - control_id: RBI-ITG-9.b
    title: IT and Information Asset Inventory
    source_ref: RBI Master Direction on IT Governance 2023, Para 9(b)
    requirement_text: |
      The RE shall maintain an up-to-date inventory of its information
      and IT assets, the criticality / sensitivity of which is
      determined based on the business processes they support.
    description: AI System Registry completeness ≥ 60% per system.
    category: governance
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - AEGIS AI System Registry export
    auto_check:
      registry_completeness_min: 60

  - control_id: RBI-ITG-12.b
    title: Information security risk assessment
    source_ref: RBI Master Direction on IT Governance 2023, Para 12(b)
    requirement_text: |
      The RE shall conduct comprehensive information security risk
      assessment, including assessment of risks emanating from
      emerging technologies and new business processes, on a periodic
      basis.
    description: AISIA exists and is at least in-progress per system.
    category: risk
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - AISIA record per AI system
    auto_check:
      aisia_status_in: [in_progress, completed, approved]

  - control_id: RBI-ITG-15
    title: Data governance
    source_ref: RBI Master Direction on IT Governance 2023, Para 15
    requirement_text: |
      The RE shall ensure that adequate data governance arrangements
      are in place to provide a structured and consistent approach to
      the management of data throughout its lifecycle, including the
      classification of data, definition of ownership and management
      of access.
    description: data_types_processed is populated per system.
    category: data
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - Per-system data_types_processed
    auto_check:
      data_types_documented: true

  - control_id: RBI-ITG-17
    title: Outsourcing of IT services — AI vendor due diligence
    source_ref: RBI Master Direction on IT Governance 2023, Para 17
    requirement_text: |
      Outsourcing of IT activities by the Regulated Entity shall be in
      accordance with the relevant Reserve Bank instructions on
      outsourcing including the Master Direction on Outsourcing of
      Information Technology Services.
    description: AI provider is assessed (catalogue-matched OR free-text provider documented).
    category: supply_chain
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - Catalogue match OR provider_name_freetext populated
      - Outsourcing agreement on file
    auto_check:
      provider_assessed: true
