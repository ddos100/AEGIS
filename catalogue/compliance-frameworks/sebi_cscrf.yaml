slug: sebi_cscrf
name: SEBI Cybersecurity and Cyber Resilience Framework (CSCRF), 2024
version: "2024 (20-Aug-2024)"
authority: Securities and Exchange Board of India
jurisdiction: IN
description: |
  SEBI CSCRF (Circular SEBI/HO/ITD-1/ITD_CSC_EXT/P/CIR/2024/113,
  20-Aug-2024). This catalogue retains ONLY the CSCRF paragraphs whose
  application to an AI system can be tested by AEGIS against Registry,
  AISIA, integration metadata, and provider catalogue. Paper-only
  paragraphs (Board policy, MFA/PAM, crypto, threat intel feeds, IRP,
  DR test plan, M-Measure dashboards, VAPT report) are intentionally
  omitted.

  Every `requirement_text` is a verbatim citation. Every control has a
  non-empty `auto_check`; auto-assessment never produces `not_assessed`.
is_active: true
controls:

  - control_id: SEBI-CSCRF-GV.2
    title: Risk-based authorisation of new AI deployments
    source_ref: SEBI CSCRF 2024 Para GV.2
    requirement_text: |
      Authorisation of new technology deployments shall be based on a
      risk assessment that considers the criticality of the function,
      data sensitivity, and threat landscape.
    description: AISIA exists and is at least in-progress per system.
    category: risk
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - AISIA record per AI system
    auto_check:
      aisia_status_in: [in_progress, completed, approved]

  - control_id: SEBI-CSCRF-ID.1
    title: Asset management and classification
    source_ref: SEBI CSCRF 2024 Para ID.1
    requirement_text: |
      The regulated entity shall maintain an up-to-date asset register
      with classification of assets based on criticality and
      sensitivity, covering owned and outsourced assets.
    description: AI System Registry completeness ≥ 60% per system.
    category: governance
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - AEGIS AI System Registry export
    auto_check:
      registry_completeness_min: 60

  - control_id: SEBI-CSCRF-ID.3
    title: Data classification
    source_ref: SEBI CSCRF 2024 Para ID.3
    requirement_text: |
      Data shall be classified based on its sensitivity (e.g., Public,
      Internal, Confidential, Restricted) with appropriate controls
      applied at each classification level.
    description: data_types_processed is populated per system.
    category: data
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - Per-system data_types_processed
    auto_check:
      data_types_documented: true

  - control_id: SEBI-CSCRF-PR.5
    title: Third-party security — AI vendor due diligence
    source_ref: SEBI CSCRF 2024 Para PR.5
    requirement_text: |
      Information security obligations shall be flowed down to
      third-party service providers including cloud providers, with
      right-to-audit and incident reporting clauses.
    description: AI provider is assessed (catalogue-matched OR free-text provider documented).
    category: supply_chain
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - Catalogue match OR provider_name_freetext populated
      - DPA with right-to-audit clause
    auto_check:
      provider_assessed: true

  - control_id: SEBI-CSCRF-DE.1
    title: Continuous security monitoring
    source_ref: SEBI CSCRF 2024 Para DE.1
    requirement_text: |
      The regulated entity shall implement continuous security
      monitoring covering all critical systems, including outsourced
      systems, with appropriate SIEM/SOC arrangements.
    description: AEGIS has observed usage events per AI system.
    category: monitoring
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - ai_usage_events present per system
    auto_check:
      usage_monitored: true
