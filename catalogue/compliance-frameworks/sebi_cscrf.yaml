slug: sebi_cscrf
name: SEBI Cybersecurity and Cyber Resilience Framework
version: "2024"
authority: Securities and Exchange Board of India
jurisdiction: IN
description: |
  SEBI CSCRF — applicable to Market Infrastructure Institutions and regulated
  intermediaries. AEGIS maps the AI-specific applicability: trading
  recommendation AI, AML/KYC AI, market surveillance AI.
is_active: true
controls:
  - control_id: SEBI-CSCRF-1.1
    title: Inventory of critical IT systems
    description: AI systems handling order, trading, or surveillance functions are inventoried.
    category: governance
    applies_to: [ai_user]
    evidence_hints:
      - AEGIS Registry export filtered by relevant category
    auto_check:
      registry_completeness_min: 60

  - control_id: SEBI-CSCRF-2.2
    title: Continuous controls assurance
    description: Controls over AI systems are tested continuously, not just point-in-time.
    category: monitoring
    applies_to: [ai_user]
    evidence_hints:
      - Daily risk recalc evidence
      - Policy violation log
    auto_check:
      risk_assessed: true

  - control_id: SEBI-CSCRF-3.1
    title: Third-party AI vendor controls
    description: AI vendors / cloud providers undergo continuous control assurance.
    category: supply_chain
    applies_to: [ai_user]
    evidence_hints:
      - Vendor SOC 2 / ISO 27001 evidence
      - DPA with AI provider
    auto_check:
      provider_assessed: true

  - control_id: SEBI-CSCRF-4.1
    title: Cybersecurity incident management
    description: AI-related cyber incidents reported per SEBI timelines.
    category: monitoring
    applies_to: [ai_user]
    evidence_hints:
      - Incident response plan referencing AI
    auto_check: {}

  - control_id: SEBI-CSCRF-5.3
    title: Algorithmic governance
    description: Trading-relevant AI systems are subject to algorithmic governance (review board, change control).
    category: governance
    applies_to: [ai_user]
    evidence_hints:
      - Algorithm governance committee charter
      - Change control records
    auto_check: {}
