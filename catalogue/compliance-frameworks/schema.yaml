# JSON Schema for compliance framework YAML files.
# Validated by catalogue/scripts/import_frameworks.py on import.
$schema: "http://json-schema.org/draft-07/schema#"
title: AEGIS Compliance Framework
type: object
required: [slug, name, version, controls]
additionalProperties: false
properties:
  slug:        { type: string, pattern: "^[a-z0-9_-]+$", maxLength: 64 }
  name:        { type: string, maxLength: 255 }
  version:     { type: string, maxLength: 32 }
  authority:   { type: string, maxLength: 128 }
  jurisdiction:{ type: string, maxLength: 32 }
  description: { type: string }
  is_active:   { type: boolean }
  controls:
    type: array
    minItems: 1
    items:
      type: object
      required: [control_id, title]
      additionalProperties: false
      properties:
        control_id:  { type: string, maxLength: 64 }
        title:       { type: string, maxLength: 512 }
        description: { type: string }
        category:
          type: string
          enum: [governance, risk, data, operations, lifecycle, supply_chain,
                 monitoring, transparency, human_oversight, security]
        is_mandatory: { type: boolean }
        applies_to:
          type: array
          items: { type: string, enum: [ai_provider, ai_user, both] }
        evidence_hints:
          type: array
          items: { type: string }
        auto_check:
          # Predicates the compliance engine evaluates against the
          # AISystem row to auto-mark this control as 'partial'.
          type: object
          additionalProperties: true
