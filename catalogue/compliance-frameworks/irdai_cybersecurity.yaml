slug: irdai_cybersecurity
name: IRDAI Information and Cyber Security Guidelines, 2023
version: "IRDAI/IT/GDL/MISC/82/04/2023"
authority: Insurance Regulatory and Development Authority of India
jurisdiction: IN
description: |
  IRDAI Information and Cyber Security Guidelines 2023. This catalogue
  retains ONLY the references whose application to an AI system can be
  tested by AEGIS against Registry, AISIA, integration metadata, and
  provider catalogue. Paper-only references (ICS Policy, ISC charter,
  RBAC docs, crypto policy, BCP, IRDAI incident channel, CERT-In audit)
  are intentionally omitted.

  Every `requirement_text` is a verbatim citation. Every control has a
  non-empty `auto_check`; auto-assessment never produces `not_assessed`.
is_active: true
controls:

  - control_id: IRDAI-ICS-3
    title: Asset management
    source_ref: IRDAI ICS Guidelines 2023, Reference 3
    requirement_text: |
      The regulated entity shall identify and classify all information
      assets and maintain an inventory of them.
    description: AI System Registry completeness ≥ 60% per system.
    category: governance
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - AEGIS AI System Registry export
    auto_check:
      registry_completeness_min: 60

  - control_id: IRDAI-ICS-4
    title: Risk assessment and management
    source_ref: IRDAI ICS Guidelines 2023, Reference 4
    requirement_text: |
      The regulated entity shall undertake periodic information and
      cyber risk assessments covering all information assets and
      third-party arrangements.
    description: AISIA exists and is at least in-progress per system.
    category: risk
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - AISIA record per AI system
    auto_check:
      aisia_status_in: [in_progress, completed, approved]

  - control_id: IRDAI-ICS-5
    title: Data classification and protection
    source_ref: IRDAI ICS Guidelines 2023, Reference 5
    requirement_text: |
      Data shall be classified according to its sensitivity and
      appropriate protection measures shall be applied throughout the
      data lifecycle, including for data shared with third parties.
    description: data_types_processed is populated per system.
    category: data
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - Per-system data_types_processed
    auto_check:
      data_types_documented: true

  - control_id: IRDAI-ICS-6
    title: Third-party / outsourcing security — AI vendor due diligence
    source_ref: IRDAI ICS Guidelines 2023, Reference 6
    requirement_text: |
      The regulated entity shall ensure that information security
      requirements are agreed with and implemented by third-party
      service providers, including cloud and AI service providers.
    description: AI provider is assessed (catalogue-matched OR free-text provider documented).
    category: supply_chain
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - Catalogue match OR provider_name_freetext populated
      - DPA on file with the AI provider
    auto_check:
      provider_assessed: true

  - control_id: IRDAI-ICS-9
    title: Logging and monitoring
    source_ref: IRDAI ICS Guidelines 2023, Reference 9
    requirement_text: |
      Logging and monitoring of information systems shall be established
      and reviewed regularly, including for outsourced services.
    description: AEGIS has observed usage events per AI system.
    category: monitoring
    is_mandatory: true
    applies_to: [ai_user]
    evidence_hints:
      - ai_usage_events present per system
    auto_check:
      usage_monitored: true
