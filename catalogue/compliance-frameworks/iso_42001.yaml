slug: iso_42001
name: ISO/IEC 42001:2023 — AI Management System
version: "2023"
authority: ISO
jurisdiction: global
description: |
  ISO/IEC 42001:2023 — AI Management System. This catalogue retains ONLY
  the controls that (a) directly govern AI systems and (b) can be tested
  by AEGIS against the AI System Registry, AISIA records, integration
  metadata, and usage telemetry. Paper-only governance artefacts (board
  approvals, internal audit programmes, training records, management
  review minutes, etc.) are intentionally NOT included — the platform
  refuses to give a verdict on what it cannot verify.

  Every `requirement_text` below is a verbatim citation from the source
  document. Every control has a non-empty `auto_check`, so auto-assessment
  always produces a definitive status (never `not_assessed`).
is_active: true
controls:

  - control_id: ISO42001-4.3
    title: Determining the scope of the AI management system — AI System Register
    source_ref: ISO/IEC 42001:2023 Clause 4.3
    requirement_text: |
      The organization shall determine the boundaries and applicability
      of the AI management system to establish its scope. The scope shall
      be available as documented information.
    description: AI System Register exists with sufficient completeness per system.
    category: governance
    applies_to: [ai_user, ai_provider]
    evidence_hints:
      - AEGIS AI System Registry export
      - Per-system records covering name, purpose, owner, data types
    auto_check:
      registry_completeness_min: 60

  - control_id: ISO42001-5.3
    title: Roles, responsibilities and authorities — owner assignment
    source_ref: ISO/IEC 42001:2023 Clause 5.3
    requirement_text: |
      Top management shall ensure that the responsibilities and
      authorities for roles relevant to the AI management system are
      assigned and communicated within the organization.
    description: Every AI system has a documented owner in the Registry.
    category: governance
    applies_to: [both]
    evidence_hints:
      - Documented ownership in the AI System Register
    auto_check:
      owner_assigned: true

  - control_id: ISO42001-6.1.2
    title: AI risk assessment
    source_ref: ISO/IEC 42001:2023 Clause 6.1.2
    requirement_text: |
      The organization shall define and apply an AI risk assessment
      process that establishes and maintains AI risk criteria; ensures
      that repeated AI risk assessments produce consistent, valid and
      comparable results; identifies, analyses and evaluates AI risks.
    description: AISIA exists and is at least in-progress for each system.
    category: risk
    applies_to: [ai_user, ai_provider]
    evidence_hints:
      - AISIA record per system
    auto_check:
      aisia_status_in: [in_progress, completed, approved]

  - control_id: ISO42001-6.1.3
    title: AI risk treatment
    source_ref: ISO/IEC 42001:2023 Clause 6.1.3
    requirement_text: |
      The organization shall define and apply an AI risk treatment
      process to select appropriate AI risk treatment options, taking
      account of the AI risk assessment results.
    description: AISIA treatment decision (Accept / Restrict / Block) is recorded per system.
    category: risk
    applies_to: [ai_user, ai_provider]
    evidence_hints:
      - AISIA treatment decision
    auto_check:
      aisia_treatment_decided: true

  - control_id: ISO42001-6.1.4
    title: AI system impact assessment — completed
    source_ref: ISO/IEC 42001:2023 Clause 6.1.4
    requirement_text: |
      The organization shall assess the potential consequences for
      individuals or groups of individuals, or both, and societies that
      can result from the development, provision or use of AI systems.
    description: AISIA is completed or approved per system.
    category: risk
    applies_to: [ai_user, ai_provider]
    evidence_hints:
      - Signed AISIA in document store
    auto_check:
      aisia_status_in: [completed, approved]

  - control_id: ISO42001-9.1
    title: Monitoring, measurement, analysis and evaluation
    source_ref: ISO/IEC 42001:2023 Clause 9.1
    requirement_text: |
      The organization shall determine what needs to be monitored and
      measured, the methods for monitoring, measurement, analysis and
      evaluation, and when monitoring and measurement shall be performed.
    description: AEGIS has observed usage events for each AI system.
    category: monitoring
    applies_to: [ai_user, ai_provider]
    evidence_hints:
      - ai_usage_events present per system
    auto_check:
      usage_monitored: true

  - control_id: ISO42001-A.4.3
    title: Data resources for AI systems
    source_ref: ISO/IEC 42001:2023 Annex A.4.3
    requirement_text: |
      As part of resource identification, the organization shall
      document information about the data resources utilized for the
      AI system.
    description: data_types_processed is populated per system.
    category: data
    applies_to: [both]
    evidence_hints:
      - Per-system data_types_processed
    auto_check:
      data_types_documented: true

  - control_id: ISO42001-A.6.2.3
    title: Documentation of AI system design and development
    source_ref: ISO/IEC 42001:2023 Annex A.6.2.3
    requirement_text: |
      The organization shall document the AI system design and
      development process.
    description: Registry completeness ≥ 80% per system.
    category: lifecycle
    applies_to: [ai_provider]
    evidence_hints:
      - Per-system documentation in the registry
    auto_check:
      registry_completeness_min: 80

  - control_id: ISO42001-A.6.2.6
    title: AI system operation and monitoring
    source_ref: ISO/IEC 42001:2023 Annex A.6.2.6
    requirement_text: |
      The organization shall define and document the necessary elements
      for the ongoing operation of the AI system. Monitoring shall be
      implemented.
    description: AEGIS has observed usage events for the system in operation.
    category: monitoring
    applies_to: [both]
    evidence_hints:
      - ai_usage_events present per system
    auto_check:
      usage_monitored: true

  - control_id: ISO42001-A.9.4
    title: Intended use of the AI system
    source_ref: ISO/IEC 42001:2023 Annex A.9.4
    requirement_text: |
      The organization shall ensure that the AI system is used in
      accordance with the intended uses of the AI system and its
      accompanying documentation.
    description: intended_purpose is documented per system.
    category: operations
    applies_to: [ai_user]
    evidence_hints:
      - Intended-purpose record in registry
    auto_check:
      intended_purpose_documented: true

  - control_id: ISO42001-A.10.2
    title: Allocation of responsibilities between AI partners
    source_ref: ISO/IEC 42001:2023 Annex A.10.2
    requirement_text: |
      The organization shall ensure that responsibilities within the
      AI life cycle are allocated between the organization, its
      partners, suppliers, customers, and third parties.
    description: AI provider is assessed (catalogue-matched OR free-text provider documented).
    category: supply_chain
    applies_to: [ai_user]
    evidence_hints:
      - Provider risk assessment
      - DPA / contract with AI provider
    auto_check:
      provider_assessed: true
