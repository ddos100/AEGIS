# Default values for the AEGIS Helm chart.
# Override per-environment by passing -f values.prod.yaml etc.

image:
  registry: ghcr.io
  repository: ddos100/aegis-api
  webRepository: ddos100/aegis-web
  tag: "0.5.0"
  pullPolicy: IfNotPresent
  # If your registry is private, set the secret name. The secret itself must
  # be created out of band (kubectl create secret docker-registry ...).
  pullSecrets: []

# ---------- API ----------
api:
  replicas: 3
  resources:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "1000m", memory: "1Gi" }
  service:
    type: ClusterIP
    port: 8000
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
  livenessPath:  /v1/health
  readinessPath: /v1/health
  # Extra env vars (non-secret). Secrets go in `secrets:` below.
  env:
    LOG_LEVEL: INFO
    LOG_JSON:  "true"

# ---------- Celery workers ----------
workerDefault:
  replicas: 2
  resources:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "1000m", memory: "1Gi" }
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8

workerIngest:
  replicas: 3
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2000m", memory: "2Gi" }
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 15

beat:
  replicas: 1                # MUST stay at 1 — beat is the scheduler
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

# ---------- Web ----------
web:
  replicas: 2
  resources:
    requests: { cpu: "50m",  memory: "128Mi" }
    limits:   { cpu: "200m", memory: "256Mi" }
  service:
    type: ClusterIP
    port: 80

# ---------- Ingress ----------
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    # WebSocket support for /v1/ws/* (Shadow AI Radar)
    nginx.ingress.kubernetes.io/proxy-read-timeout:  "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout:  "3600"
  hosts:
    - host: aegis.example.com
      paths:
        - { path: /v1, pathType: Prefix, backend: api }
        - { path: /,   pathType: Prefix, backend: web }
  tls:
    - secretName: aegis-tls
      hosts: [aegis.example.com]

# ---------- Dependencies (use managed services in prod) ----------
postgres:
  # Reference a managed RDS / CloudSQL via Secret + Service ExternalName.
  # For dev, the in-cluster bitnami chart is fine; set `bundle: true`.
  bundle: false
  host:     postgres.prod.internal
  port:     5432
  database: aegis
  # Credentials read from existingSecret if provided.
  existingSecret: aegis-postgres   # keys: username, password

redis:
  bundle: false
  host: redis.prod.internal
  port: 6379

keycloak:
  bundle: false
  url:        https://auth.aegis.example.com
  publicUrl:  https://auth.aegis.example.com
  realm:      aegis
  audience:   aegis-api

# ---------- Secrets ----------
# Names of pre-existing Kubernetes Secrets. AEGIS never creates secrets
# itself — they should be provisioned via External Secrets Operator
# (HashiCorp Vault / AWS Secrets Manager / GCP Secret Manager).
secrets:
  # Required keys: DATABASE_URL, DATABASE_URL_SYNC, REDIS_URL,
  # CELERY_BROKER_URL, CELERY_RESULT_BACKEND
  database: aegis-database          # contains DATABASE_URL etc.
  # Required key: INGEST_API_KEY
  ingest:   aegis-ingest
  # Required key: FERNET_KEY (and optionally FERNET_KEY_PREVIOUS)
  fernet:   aegis-fernet
  # Optional: ANTHROPIC_API_KEY for Claude narratives
  anthropic: aegis-anthropic

# ---------- Observability ----------
serviceMonitor:
  enabled: false           # set true if running Prometheus Operator
  interval: 30s

podDisruptionBudget:
  enabled: true
  minAvailable: 2          # for the api deployment
