<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AEGIS — Options</title>
    <style>
      body  { font-family: -apple-system, Segoe UI, sans-serif; max-width: 480px;
              margin: 24px auto; padding: 0 18px; background: #f8fafc; color: #1e293b; }
      h1    { font-size: 18px; color: #1F3864; margin: 0 0 12px; }
      p     { margin: 4px 0 12px; color: #475569; font-size: 13px; }
      label { display: block; font-size: 12px; font-weight: 600;
              text-transform: uppercase; letter-spacing: 0.04em; color: #475569; margin-top: 14px; }
      input { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #cbd5e1;
              border-radius: 6px; font-size: 14px; box-sizing: border-box; }
      button { margin-top: 20px; padding: 8px 16px; background: #1F3864; color: white;
               border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
      button:hover { background: #2E5597; }
      #status { margin-top: 14px; font-size: 12px; color: #16a34a; min-height: 1em; }
      #status.error { color: #dc2626; }
    </style>
  </head>
  <body>
    <h1>AEGIS Detector — Options</h1>
    <p>Configure the connection to your AEGIS deployment. These values are stored locally; the
       ingest key is shared by your AEGIS server and is sent only over TLS in production.</p>

    <label for="apiUrl">API URL</label>
    <input id="apiUrl" type="url" placeholder="https://aegis.example.com/v1" />

    <label for="tenantId">Tenant ID (UUID)</label>
    <input id="tenantId" type="text" placeholder="00000000-0000-0000-0000-000000000001" />

    <label for="apiKey">Ingest API Key</label>
    <input id="apiKey" type="password" placeholder="dev-ingest-key-change-me" />

    <button id="save">Save and re-enroll</button>
    <div id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
